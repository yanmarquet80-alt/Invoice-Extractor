<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dépôt de Facture</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px;
      width: 100%;
      max-width: 520px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: #4f46e5;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .logo h1 { font-size: 18px; font-weight: 700; color: #111; }
    .logo p  { font-size: 13px; color: #6b7280; }

    h2 { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 28px; }

    .field { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    label span { color: #ef4444; }

    input[type="text"], input[type="date"], select {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px; font-size: 14px; color: #111;
      background: #fff; transition: border-color .15s;
      appearance: none; -webkit-appearance: none;
    }
    input:focus, select:focus {
      outline: none; border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,.1);
    }

    .select-wrapper { position: relative; }
    .select-wrapper::after {
      content: '▾'; position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%); pointer-events: none; color: #6b7280;
    }

    #nouveau-nom-field { margin-top: 12px; display: none; }
    #nouveau-nom-field input { border-style: dashed; }

    .drop-zone {
      border: 2px dashed #d1d5db; border-radius: 10px;
      padding: 32px 20px; text-align: center; cursor: pointer;
      transition: border-color .15s, background .15s; position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #4f46e5; background: #f5f3ff;
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-zone .icon { font-size: 28px; margin-bottom: 8px; }
    .drop-zone .label { font-size: 14px; color: #374151; font-weight: 500; }
    .drop-zone .hint  { font-size: 12px; color: #9ca3af; margin-top: 4px; }
    .drop-zone .file-name {
      margin-top: 10px; font-size: 13px; color: #4f46e5; font-weight: 600; display: none;
    }

    button[type="submit"] {
      width: 100%; padding: 13px;
      background: #4f46e5; color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background .15s, transform .1s;
      margin-top: 8px;
    }
    button[type="submit"]:hover:not(:disabled) { background: #4338ca; }
    button[type="submit"]:active:not(:disabled) { transform: scale(.98); }
    button[type="submit"]:disabled { background: #a5b4fc; cursor: not-allowed; }

    .status {
      display: none; margin-top: 20px; padding: 14px 16px;
      border-radius: 10px; font-size: 14px; font-weight: 500;
    }
    .status.success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .status.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
    .status.loading { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #bfdbfe; border-top-color: #1e40af;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🧾</div>
    <div>
      <h1>Invoice Extractor</h1>
      <p>Extraction automatique via IA</p>
    </div>
  </div>

  <h2>Déposer une facture</h2>
  <p class="subtitle">Les données seront extraites et enregistrées automatiquement.</p>

  <form id="invoiceForm" enctype="multipart/form-data">

    <div class="field">
      <label>Nom de l'employé <span>*</span></label>
      <input type="text" name="Nom de l'employé" placeholder="Ex: Jean Dupont" required>
    </div>

    <div class="field">
      <label>Date de soumission <span>*</span></label>
      <input type="date" name="Date de création" required>
    </div>

    <div class="field">
      <label>Société <span>*</span></label>
      <div class="select-wrapper">
        <select id="societeSelect" name="_societe_select">
          <option value="" disabled selected>Chargement…</option>
        </select>
      </div>
      <div id="nouveau-nom-field">
        <input type="text" id="nouveauNom" placeholder="Nom de la nouvelle société" autocomplete="off">
      </div>
    </div>

    <!-- Hidden field that carries the final company name -->
    <input type="hidden" name="Nom de la société" id="nomSocieteHidden">

    <div class="field">
      <label>Facture (PDF, JPG, PNG) <span>*</span></label>
      <div class="drop-zone" id="dropZone">
        <input type="file" name="Fichier" id="fileInput" accept=".pdf,.jpg,.jpeg,.png" required>
        <div class="icon">📎</div>
        <div class="label">Cliquez ou glissez votre fichier ici</div>
        <div class="hint">PDF, JPG ou PNG · Max 10 Mo</div>
        <div class="file-name" id="fileName"></div>
      </div>
    </div>

    <button type="submit" id="submitBtn">Envoyer la facture</button>

    <div class="status" id="status"></div>
  </form>
</div>

<script>
  const N8N_BASE    = 'https://n8n.srv1399636.hstgr.cloud/webhook';
  const GET_URL     = `${N8N_BASE}/get-companies`;
  const POST_URL    = `${N8N_BASE}/invoice-form`;

  const select      = document.getElementById('societeSelect');
  const nouveauDiv  = document.getElementById('nouveau-nom-field');
  const nouveauNom  = document.getElementById('nouveauNom');
  const hidden      = document.getElementById('nomSocieteHidden');
  const fileInput   = document.getElementById('fileInput');
  const fileName    = document.getElementById('fileName');
  const dropZone    = document.getElementById('dropZone');
  const form        = document.getElementById('invoiceForm');
  const submitBtn   = document.getElementById('submitBtn');
  const status      = document.getElementById('status');

  // Set today's date
  document.querySelector('input[name="Date de création"]').value =
    new Date().toISOString().slice(0, 10);

  // Load companies
  async function loadCompanies() {
    try {
      const r = await fetch(GET_URL);
      const d = await r.json();
      const companies = d.companies || [];

      select.innerHTML = '';
      if (companies.length > 0) {
        const placeholder = new Option('— Sélectionner une société —', '', true, true);
        placeholder.disabled = true;
        select.add(placeholder);
        companies.forEach(c => select.add(new Option(c, c)));
      }
      select.add(new Option('➕  Nouvelle société…', '__new__'));
    } catch {
      select.innerHTML = '<option value="__new__">➕  Nouvelle société (hors ligne)</option>';
    }
  }
  loadCompanies();

  // Dropdown change
  select.addEventListener('change', () => {
    if (select.value === '__new__') {
      nouveauDiv.style.display = 'block';
      nouveauNom.required = true;
      nouveauNom.focus();
      hidden.value = '';
    } else {
      nouveauDiv.style.display = 'none';
      nouveauNom.required = false;
      hidden.value = select.value;
    }
  });

  nouveauNom.addEventListener('input', () => {
    hidden.value = nouveauNom.value.trim();
  });

  // File drop
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) {
      fileName.textContent = fileInput.files[0].name;
      fileName.style.display = 'block';
    }
  });

  ['dragover','dragenter'].forEach(e => dropZone.addEventListener(e, ev => {
    ev.preventDefault(); dropZone.classList.add('drag-over');
  }));
  ['dragleave','drop'].forEach(e => dropZone.addEventListener(e, () =>
    dropZone.classList.remove('drag-over')
  ));

  // Submit
  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    // Validate society name
    const societe = hidden.value.trim();
    if (!societe) {
      showStatus('error', 'Veuillez sélectionner ou saisir le nom de la société.');
      return;
    }

    if (!fileInput.files[0]) {
      showStatus('error', 'Veuillez sélectionner un fichier.');
      return;
    }

    submitBtn.disabled = true;
    showStatus('loading', '<span class="spinner"></span>Traitement en cours…');

    const fd = new FormData();
    fd.append("Nom de l'employé", form.querySelector('input[name="Nom de l\'employé"]').value);
    fd.append("Date de création", form.querySelector('input[name="Date de création"]').value);
    fd.append("Nom de la société", societe);
    fd.append("Fichier", fileInput.files[0]);

    try {
      const r = await fetch(POST_URL, { method: 'POST', body: fd });
      if (r.ok) {
        showStatus('success', `✅ Facture envoyée avec succès pour <strong>${societe}</strong> ! Les données ont été extraites et enregistrées.`);
        form.reset();
        fileName.style.display = 'none';
        nouveauDiv.style.display = 'none';
        select.value = '';
        document.querySelector('input[name="Date de création"]').value = new Date().toISOString().slice(0,10);
        await loadCompanies();
      } else {
        throw new Error(`Erreur serveur: ${r.status}`);
      }
    } catch (err) {
      showStatus('error', `❌ Une erreur est survenue. Veuillez réessayer.<br><small>${err.message}</small>`);
    } finally {
      submitBtn.disabled = false;
    }
  });

  function showStatus(type, msg) {
    status.className = `status ${type}`;
    status.innerHTML = msg;
    status.style.display = 'block';
  }
</script>
</body>
</html>
